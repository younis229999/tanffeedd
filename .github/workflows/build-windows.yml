name: بناء نسخة ويندوز (.exe)

# يعمل تلقائياً عند رفع تعديلات، أو يدوياً بضغطة زر من تبويب Actions،
# وينشئ "إصدار" قابلاً للتنزيل عند وضع وسم (tag) يبدأ بـ v مثل v1.0.
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:        # زر تشغيل يدوي من واجهة GitHub.

jobs:
  build:
    runs-on: windows-latest   # حاسبة ويندوز افتراضية مجانية من GitHub.
    permissions:
      contents: write         # مطلوبة لإنشاء صفحة الإصدار (Release) ورفع الـ exe.
    steps:
      - name: جلب الكود
        uses: actions/checkout@v4

      - name: تهيئة Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المتطلبات
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: بناء الملف التنفيذي
        run: pyinstaller build.spec --noconfirm

      # يرفع الـ exe كملف قابل للتنزيل من صفحة التشغيل (Artifacts).
      - name: رفع الـ exe كأرتيفاكت
        uses: actions/upload-artifact@v4
        with:
          name: altanfith-Windows
          path: dist/altanfith.exe

      # عند وضع وسم إصدار (مثل v1.0) يُنشئ صفحة Release فيها الـ exe للتنزيل المباشر.
      - name: نشر كإصدار (Release) عند الوسم
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/altanfith.exe
